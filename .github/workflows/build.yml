name: Build REVERS APK

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java
        uses: actions/setup-java@v3
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install Dependencies
        run: |
          npm install
          npm install @capacitor/core @capacitor/android @capacitor/assets

      - name: Generate Icons
        run: npx capacitor-assets generate --iconBackgroundColor #0F0F12 --iconBackgroundColorDark #0F0F12 --splashBackgroundColor #0F0F12

      - name: Build APK
        run: |
          npx cap init REVERS com.revers.messenger --web-dir=src
          npx cap add android
          npx cap sync
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: REVERS-APK
          path: android/app/build/outputs/apk/debug/app-debug.apk
